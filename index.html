<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data:">
  <title>Stuff Diver</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="header-row header-row-1">
      <div class="header-left">
        <div class="brand">
          <img class="logo-img" src="logo.png" alt="Stuff Diver">
          <h1>Stuff Diver</h1>
        </div>
        <button id="select-folder">Select Folder</button>
        <span id="folder-path"></span>
      </div>
      <div class="header-right">
        <span id="app-version" class="app-version"></span>
        <button id="settings-btn" class="settings-btn" title="Settings">&#9881;</button>
        <button id="theme-toggle" class="theme-toggle-btn" title="Toggle light/dark mode">
          <span class="theme-icon-dark">&#9790;</span>
          <span class="theme-icon-light">&#9728;</span>
        </button>
      </div>
    </div>
    <div class="header-row header-row-2">
      <div class="toolbar-group">
        <span class="toolbar-label">View</span>
        <div class="view-toggle">
          <button id="view-treemap" class="active">Treemap</button>
          <button id="view-rings">Rings</button>
          <button id="view-pie">Pie Chart</button>
          <button id="view-bubblemap">Bubbles</button>
          <button id="view-table">Table</button>
        </div>
      </div>
      <div class="toolbar-sep"></div>
      <div class="toolbar-group">
        <span class="toolbar-label">Colour</span>
        <div class="color-toggle">
          <button id="color-age" class="active">Age</button>
          <button id="color-type">Type</button>
          <button id="color-folder">Folder</button>
        </div>
      </div>
      <div class="toolbar-sep"></div>
      <div class="toolbar-group toolbar-actions">
        <button id="view-duplicates" class="dup-toggle">Find Duplicates</button>
        <button id="btn-export" class="export-btn">Export CSV</button>
        <button id="btn-filter" class="export-btn">Filter</button>
      </div>
    </div>
  </header>

  <div id="stats" class="hidden"></div>
  <div id="stats-summary" class="hidden"></div>
  <div id="filter-bar" class="hidden"></div>
  <div id="bubble-breadcrumb" class="hidden">
    <span id="breadcrumb-trail"></span>
  </div>

  <!-- Update banner -->
  <div id="update-banner" class="hidden">
    <span id="update-banner-text"></span>
    <button id="update-banner-details">View Details</button>
    <button id="update-banner-dismiss" class="update-dismiss">&times;</button>
  </div>

  <!-- Settings modal -->
  <div id="settings-overlay" class="modal-overlay hidden">
    <div class="settings-modal">
      <div class="settings-header">
        <h2>Settings</h2>
        <button id="settings-close" class="settings-close-btn">&times;</button>
      </div>
      <div class="settings-body">
        <div class="settings-section">
          <label class="settings-label">App Version</label>
          <span id="settings-version" class="settings-value"></span>
        </div>
        <div class="settings-section">
          <label class="settings-label" for="settings-update-url">Update Server URL</label>
          <input id="settings-update-url" type="text" class="settings-input" placeholder="http://localhost:9090">
        </div>
        <div class="settings-section">
          <button id="settings-check-update" class="settings-btn-primary">Check for Updates</button>
          <span id="settings-update-status" class="settings-update-status"></span>
        </div>
        <div id="settings-update-result" class="settings-update-result hidden">
          <div id="settings-update-version" class="settings-update-version"></div>
          <div id="settings-update-notes" class="settings-update-notes"></div>
          <div id="settings-download-progress" class="settings-download-progress hidden">
            <div class="progress-bar-track">
              <div id="settings-progress-fill" class="progress-bar-fill"></div>
            </div>
            <span id="settings-progress-text" class="progress-text">0%</span>
          </div>
          <button id="settings-download-btn" class="settings-btn-download">Download &amp; Install Update</button>
          <button id="settings-install-btn" class="settings-btn-install hidden">Restart &amp; Install Now</button>
        </div>
        <div class="settings-section settings-save-row">
          <button id="settings-save" class="settings-btn-primary">Save Settings</button>
          <span id="settings-save-status" class="settings-save-status"></span>
        </div>
      </div>
    </div>
  </div>

  <main>
    <div id="folder-panel" class="hidden">
      <div class="folder-header">
        <span class="fh-name">Folder</span>
        <span class="fh-size">Size</span>
        <span class="fh-count">Contents</span>
        <span class="fh-date">Modified</span>
      </div>
      <div id="folder-tree"></div>
    </div>
    <div id="visualization">
      <div class="empty-state">
        <img class="logo-img-large" src="logo.png" alt="Stuff Diver">
        <p>Select a folder to dive into</p>
      </div>
    </div>
  </main>

  <div id="detail-panel">
    <div class="detail-info">
      <span id="detail-name"></span>
      <span id="detail-path"></span>
      <span id="detail-size"></span>
    </div>
    <div class="detail-actions">
      <button id="action-open">Open</button>
      <button id="action-preview">Quick Look</button>
      <button id="action-show">Show in Finder</button>
    </div>
  </div>

  <div id="loading" class="hidden">
    <div class="loading-logo-wrap">
      <img class="logo-img-loading" src="logo.png" alt="Stuff Diver">
    </div>
    <p id="loading-text">Diving in...</p>
  </div>

  <div id="tooltip"></div>

  <script src="renderer.js"></script>
</body>
</html>
