<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data:">
  <title>Stuff Diver</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="header-row header-row-1">
      <div class="header-left">
        <div class="brand">
          <svg class="logo-svg" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="grad-mask" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#00d2ff"/>
                <stop offset="100%" stop-color="#7b5cff"/>
              </linearGradient>
              <linearGradient id="grad-visor" x1="18" y1="20" x2="46" y2="42" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#0a1628"/>
                <stop offset="100%" stop-color="#142040"/>
              </linearGradient>
              <linearGradient id="grad-platter" x1="24" y1="24" x2="40" y2="40" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#00d2ff" stop-opacity="0.5"/>
                <stop offset="100%" stop-color="#7b5cff" stop-opacity="0.3"/>
              </linearGradient>
            </defs>
            <rect x="8" y="12" width="48" height="36" rx="14" stroke="url(#grad-mask)" stroke-width="3" fill="none"/>
            <rect x="16" y="18" width="32" height="24" rx="8" fill="url(#grad-visor)" stroke="url(#grad-mask)" stroke-width="1.5" opacity="0.9"/>
            <circle cx="32" cy="30" r="9" stroke="url(#grad-platter)" stroke-width="1.2" fill="none" opacity="0.7"/>
            <circle cx="32" cy="30" r="5" stroke="url(#grad-platter)" stroke-width="1" fill="none" opacity="0.5"/>
            <circle cx="32" cy="30" r="1.8" fill="#00d2ff" opacity="0.9"/>
            <line x1="33" y1="30" x2="41" y2="22" stroke="#00d2ff" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
            <path d="M52 16 Q58 16 58 10 Q58 4 52 4" stroke="url(#grad-mask)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <circle cx="50" cy="2" r="1.5" fill="#00d2ff" opacity="0.5"/>
            <circle cx="54" cy="5" r="1" fill="#7b5cff" opacity="0.4"/>
            <circle cx="47" cy="4" r="0.8" fill="#00d2ff" opacity="0.3"/>
            <line x1="8" y1="30" x2="3" y2="30" stroke="url(#grad-mask)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
          </svg>
          <h1>Stuff Diver</h1>
        </div>
        <button id="select-folder">Select Folder</button>
        <span id="folder-path"></span>
      </div>
      <div class="header-right"></div>
    </div>
    <div class="header-row header-row-2">
      <div class="toolbar-group">
        <span class="toolbar-label">Folders</span>
        <div class="view-toggle">
          <button id="view-treemap" class="active">Treemap</button>
          <button id="view-rings">Rings</button>
        </div>
      </div>
      <div class="toolbar-group">
        <span class="toolbar-label">Files</span>
        <div class="view-toggle">
          <button id="view-pie">Pie Chart</button>
          <button id="view-bubblemap">Bubbles</button>
          <button id="view-table">Table</button>
        </div>
      </div>
      <div class="toolbar-sep"></div>
      <div class="toolbar-group">
        <span class="toolbar-label">Colour</span>
        <div class="color-toggle">
          <button id="color-age" class="active">Age</button>
          <button id="color-type">Type</button>
          <button id="color-folder">Folder</button>
        </div>
      </div>
      <div class="toolbar-sep"></div>
      <div class="toolbar-group toolbar-actions">
        <button id="view-duplicates" class="dup-toggle">Find Duplicates</button>
        <button id="btn-export" class="export-btn">Export CSV</button>
        <button id="btn-filter" class="export-btn">Filter</button>
      </div>
    </div>
  </header>

  <div id="stats" class="hidden"></div>
  <div id="stats-summary" class="hidden"></div>
  <div id="filter-bar" class="hidden"></div>
  <div id="bubble-breadcrumb" class="hidden">
    <span id="breadcrumb-trail"></span>
  </div>

  <main>
    <div id="folder-panel" class="hidden">
      <div class="folder-header">
        <span class="fh-name">Folder</span>
        <span class="fh-size">Size</span>
        <span class="fh-count">Contents</span>
        <span class="fh-date">Modified</span>
      </div>
      <div id="folder-tree"></div>
    </div>
    <div id="visualization">
      <div class="empty-state">
        <!-- Large logo for empty state -->
        <svg class="logo-svg-large" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="grad-mask-lg" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#00d2ff"/>
              <stop offset="100%" stop-color="#7b5cff"/>
            </linearGradient>
            <linearGradient id="grad-visor-lg" x1="18" y1="20" x2="46" y2="42" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#0a1628"/>
              <stop offset="100%" stop-color="#142040"/>
            </linearGradient>
            <linearGradient id="grad-platter-lg" x1="24" y1="24" x2="40" y2="40" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#00d2ff" stop-opacity="0.5"/>
              <stop offset="100%" stop-color="#7b5cff" stop-opacity="0.3"/>
            </linearGradient>
          </defs>
          <rect x="8" y="12" width="48" height="36" rx="14" stroke="url(#grad-mask-lg)" stroke-width="2.5" fill="none"/>
          <rect x="16" y="18" width="32" height="24" rx="8" fill="url(#grad-visor-lg)" stroke="url(#grad-mask-lg)" stroke-width="1.5" opacity="0.9"/>
          <circle cx="32" cy="30" r="9" stroke="url(#grad-platter-lg)" stroke-width="1.2" fill="none" opacity="0.7"/>
          <circle cx="32" cy="30" r="5" stroke="url(#grad-platter-lg)" stroke-width="1" fill="none" opacity="0.5"/>
          <circle cx="32" cy="30" r="1.8" fill="#00d2ff" opacity="0.9"/>
          <line x1="33" y1="30" x2="41" y2="22" stroke="#00d2ff" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
          <path d="M52 16 Q58 16 58 10 Q58 4 52 4" stroke="url(#grad-mask-lg)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <circle cx="50" cy="2" r="1.5" fill="#00d2ff" opacity="0.5"/>
          <circle cx="54" cy="5" r="1" fill="#7b5cff" opacity="0.4"/>
          <circle cx="47" cy="4" r="0.8" fill="#00d2ff" opacity="0.3"/>
          <line x1="8" y1="30" x2="3" y2="30" stroke="url(#grad-mask-lg)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
        </svg>
        <p>Select a folder to dive into</p>
      </div>
    </div>
  </main>

  <div id="detail-panel">
    <div class="detail-info">
      <span id="detail-name"></span>
      <span id="detail-path"></span>
      <span id="detail-size"></span>
    </div>
    <div class="detail-actions">
      <button id="action-open">Open</button>
      <button id="action-preview">Quick Look</button>
      <button id="action-show">Show in Finder</button>
    </div>
  </div>

  <div id="loading" class="hidden">
    <div class="loading-logo-wrap">
      <!-- Loading logo SVG -->
      <svg class="logo-svg-loading" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="grad-mask-ld" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#00d2ff"/>
            <stop offset="100%" stop-color="#7b5cff"/>
          </linearGradient>
          <linearGradient id="grad-visor-ld" x1="18" y1="20" x2="46" y2="42" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#0a1628"/>
            <stop offset="100%" stop-color="#142040"/>
          </linearGradient>
          <linearGradient id="grad-platter-ld" x1="24" y1="24" x2="40" y2="40" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#00d2ff" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#7b5cff" stop-opacity="0.3"/>
          </linearGradient>
        </defs>
        <rect x="8" y="12" width="48" height="36" rx="14" stroke="url(#grad-mask-ld)" stroke-width="2.5" fill="none"/>
        <rect x="16" y="18" width="32" height="24" rx="8" fill="url(#grad-visor-ld)" stroke="url(#grad-mask-ld)" stroke-width="1.5" opacity="0.9"/>
        <circle cx="32" cy="30" r="9" stroke="url(#grad-platter-ld)" stroke-width="1.2" fill="none" opacity="0.7">
          <animateTransform attributeName="transform" type="rotate" from="0 32 30" to="360 32 30" dur="3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="32" cy="30" r="5" stroke="url(#grad-platter-ld)" stroke-width="1" fill="none" opacity="0.5">
          <animateTransform attributeName="transform" type="rotate" from="0 32 30" to="-360 32 30" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="32" cy="30" r="1.8" fill="#00d2ff" opacity="0.9"/>
        <line x1="33" y1="30" x2="41" y2="22" stroke="#00d2ff" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
        <path d="M52 16 Q58 16 58 10 Q58 4 52 4" stroke="url(#grad-mask-ld)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      </svg>
      <svg class="loading-bubbles" viewBox="0 0 130 80" fill="none">
        <circle cx="95" cy="72" r="3" fill="#00d2ff">
          <animate attributeName="cy" from="72" to="-15" dur="2.2s" repeatCount="indefinite"/>
          <animate attributeName="cx" from="95" to="102" dur="2.2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.65;0.5;0" keyTimes="0;0.1;0.7;1" dur="2.2s" repeatCount="indefinite"/>
          <animate attributeName="r" from="2.5" to="6" dur="2.2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="100" cy="72" r="2" fill="#7b5cff">
          <animate attributeName="cy" from="72" to="0" dur="1.8s" begin="0.7s" repeatCount="indefinite"/>
          <animate attributeName="cx" from="100" to="115" dur="1.8s" begin="0.7s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.5;0.35;0" keyTimes="0;0.12;0.7;1" dur="1.8s" begin="0.7s" repeatCount="indefinite"/>
          <animate attributeName="r" from="1.5" to="4.5" dur="1.8s" begin="0.7s" repeatCount="indefinite"/>
        </circle>
        <circle cx="92" cy="72" r="2.5" fill="#00d2ff">
          <animate attributeName="cy" from="72" to="-20" dur="2.8s" begin="1.4s" repeatCount="indefinite"/>
          <animate attributeName="cx" from="92" to="85" dur="2.8s" begin="1.4s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.6;0.4;0" keyTimes="0;0.1;0.65;1" dur="2.8s" begin="1.4s" repeatCount="indefinite"/>
          <animate attributeName="r" from="2" to="7" dur="2.8s" begin="1.4s" repeatCount="indefinite"/>
        </circle>
      </svg>
    </div>
    <p id="loading-text">Diving in...</p>
  </div>

  <div id="tooltip"></div>

  <script src="renderer.js"></script>
</body>
</html>
